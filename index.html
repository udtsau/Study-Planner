<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner</title>
  <style>
    :root {
      --apple-blue: #007AFF;
      --apple-gray: #8E8E93;
      --container-bg: rgba(255, 255, 255, 0.7); 
      --text-color: #000000;
      --input-bg: rgba(0, 0, 0, 0.05);
      --task-bg: rgba(255, 255, 255, 0.5);
      --border-color: rgba(0, 0, 0, 0.1);
      --aura-bg: #f5f5f7;
      --orb-opacity: 0.3;
    }

    [data-theme="dark"] {
      --container-bg: rgba(28, 28, 30, 0.8);
      --text-color: #ffffff;
      --input-bg: rgba(255, 255, 255, 0.1);
      --task-bg: rgba(255, 255, 255, 0.05);
      --apple-gray: #aeaeb2;
      --border-color: rgba(255, 255, 255, 0.1);
      --aura-bg: #000000;
      --orb-opacity: 0.5;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background-color: var(--aura-bg);
      background-image: 
        radial-gradient(circle at 15% 30%, rgba(255, 0, 150, var(--orb-opacity)) 0%, transparent 25%),
        radial-gradient(circle at 85% 70%, rgba(255, 120, 0, var(--orb-opacity)) 0%, transparent 25%),
        radial-gradient(circle at 50% 10%, rgba(150, 0, 255, var(--orb-opacity)) 0%, transparent 30%);
      transition: all 0.5s ease;
    }

    body {
      <div class="container">
  <button class="mode-toggle" onclick="toggleDarkMode()" id="themeBtn">🌙</button>

  <h2>Study Planner</h2>
  
  <div class="setup-group" style="display: flex; gap: 5px; margin-bottom: 10px;">
    <input type="number" id="studyInput" placeholder="Study (min)" style="width: 50%;">
    <input type="number" id="breakInput" placeholder="Break (min)" style="width: 50%;">
  </div>
  
  <input type="text" id="subject" placeholder="Subject">
  <input type="text" id="topic" placeholder="Topic">
  <button class="primary-btn" onclick="addTask()">Add Task</button>

  <p id="mode">MODE: STUDY</p>
  <p id="timer">60:00</p>
  
  <div class="button-group">
    <button class="timer-btn" onclick="startTimer()">Start</button>
    <button class="timer-btn" onclick="pauseTimer()">Pause</button>
    <button class="timer-btn" onclick="resetTimer()">Reset</button>
  </div>

  <div id="taskList"></div>
</div>

<script>
  // Default values or loaded from storage
  let studyMins = localStorage.getItem("customStudy") || 60;
  let breakMins = localStorage.getItem("customBreak") || 10;
  
  let time = localStorage.getItem("timerTime") ? parseInt(localStorage.getItem("timerTime")) : studyMins * 60;
  let interval = null;
  let isStudy = localStorage.getItem("timerMode") === "false" ? false : true;
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  // Set input display values
  document.getElementById("studyInput").value = studyMins;
  document.getElementById("breakInput").value = breakMins;

  /* --- Dark Mode --- */
  function toggleDarkMode() {
    const theme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("theme", theme);
    document.getElementById("themeBtn").innerText = theme === "dark" ? "☀️" : "🌙";
  }
  const savedTheme = localStorage.getItem("theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);

  /* --- Timer Logic --- */
  function updateDisplay() {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    document.getElementById("mode").innerText = isStudy ? "MODE: STUDY" : "MODE: BREAK";
    
    localStorage.setItem("timerTime", time);
    localStorage.setItem("timerMode", isStudy);
    localStorage.setItem("lastTimestamp", Date.now());
  }

  function startTimer() {
    if (interval) return;
    
    // Lock in custom times when you hit start
    studyMins = document.getElementById("studyInput").value;
    breakMins = document.getElementById("breakInput").value;
    localStorage.setItem("customStudy", studyMins);
    localStorage.setItem("customBreak", breakMins);

    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        interval = null;
        isStudy = !isStudy;
        time = isStudy ? studyMins * 60 : breakMins * 60;
        startTimer();
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    interval = null;
  }

  function resetTimer() {
    pauseTimer();
    studyMins = document.getElementById("studyInput").value;
    time = studyMins * 60;
    isStudy = true;
    updateDisplay();
  }

  function loadTimerState() {
    const lastTimestamp = localStorage.getItem("lastTimestamp");
    if (lastTimestamp && time > 0) {
      const elapsed = Math.floor((Date.now() - parseInt(lastTimestamp)) / 1000);
      time = Math.max(0, time - elapsed);
      updateDisplay();
      if (time > 0) startTimer();
    }
  }

  /* --- Task Logic (No MCQs) --- */
  function addTask() {
    const s = document.getElementById("subject").value;
    const t = document.getElementById("topic").value;
    if (!s || !t) return alert("Fill Subject and Topic");

    tasks.push({ s, t, done: false });
    saveAndShow();
    document.getElementById("subject").value = "";
    document.getElementById("topic").value = "";
  }

  function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    saveAndShow();
  }

  function deleteTask(i) {
    tasks.splice(i, 1);
    saveAndShow();
  }

  function saveAndShow() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    const list = document.getElementById("taskList");
    list.innerHTML = "";
    tasks.forEach((task, i) => {
      list.innerHTML += `
        <div class="task">
          <span class="task-text ${task.done ? 'completed' : ''}">${task.s} - ${task.t}</span>
          <div>
            <button class="action-btn tick-btn" onclick="toggleTask(${i})">✓</button>
            <button class="action-btn cross-btn" onclick="deleteTask(${i})">✕</button>
          </div>
        </div>`;
    });
  }

  saveAndShow();
  loadTimerState();
  updateDisplay();
</script>
let time = 3600; 
  let interval = null;
  let isStudy = true;
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  /* --- Dark Mode Logic --- */
  function toggleDarkMode() {
    const currentTheme = document.documentElement.getAttribute("data-theme");
    const newTheme = currentTheme === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
    document.getElementById("themeBtn").innerText = newTheme === "dark" ? "☀️" : "🌙";
  }

  const savedTheme = localStorage.getItem("theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  document.getElementById("themeBtn").innerText = savedTheme === "dark" ? "☀️" : "🌙";

  /* --- Persistent Timer Logic --- */
  function updateDisplay() {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    
    // SAVE DATA EVERY SECOND
    localStorage.setItem("timerTime", time);
    localStorage.setItem("timerMode", isStudy);
    localStorage.setItem("lastTimestamp", Date.now());
  }

  function loadTimerState() {
    const savedTime = localStorage.getItem("timerTime");
    const savedMode = localStorage.getItem("timerMode");
    const lastTimestamp = localStorage.getItem("lastTimestamp");

    if (savedTime !== null && lastTimestamp !== null) {
      isStudy = (savedMode === 'true');
      const elapsedSeconds = Math.floor((Date.now() - parseInt(lastTimestamp)) / 1000);
      
      // Calculate how much time is left after the "laptop death" period
      time = Math.max(0, parseInt(savedTime) - elapsedSeconds);
      
      document.getElementById("mode").innerText = isStudy ? "MODE: STUDY" : "MODE: BREAK";
      updateDisplay();

      // If the timer was running before it crashed, restart it automatically
      if (time > 0) {
        startTimer();
      }
    }
  }

  function startTimer() {
    if (interval) return;
    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        interval = null;
        isStudy = !isStudy;
        time = isStudy ? 3600 : 600;
        document.getElementById("mode").innerText = isStudy ? "MODE: STUDY" : "MODE: BREAK";
        startTimer();
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    interval = null;
  }

  function resetTimer() {
    pauseTimer();
    time = 3600;
    isStudy = true;
    document.getElementById("mode").innerText = "MODE: STUDY";
    localStorage.removeItem("timerTime");
    localStorage.removeItem("lastTimestamp");
    updateDisplay();
  }

  /* --- Task Logic --- */
  function addTask() {
    const s = document.getElementById("subject").value;
    const t = document.getElementById("topic").value;
    const q = document.getElementById("questions").value;
    if (!s || !t || !q) return alert("Fill all fields");
    tasks.push({ s, t, q, done: false });
    saveAndShow();
    document.getElementById("subject").value = "";
    document.getElementById("topic").value = "";
    document.getElementById("questions").value = "";
  }

  function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    saveAndShow();
  }

  function deleteTask(i) {
    tasks.splice(i, 1);
    saveAndShow();
  }

  function saveAndShow() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    const list = document.getElementById("taskList");
    list.innerHTML = "";
    tasks.forEach((task, i) => {
      list.innerHTML += `
        <div class="task">
          <span class="task-text ${task.done ? 'completed' : ''}">
            ${task.s} - ${task.t} (${task.q} MCQs)
          </span>
          <div class="action-buttons">
            <button class="action-btn tick-btn" onclick="toggleTask(${i})">✓</button>
            <button class="action-btn cross-btn" onclick="deleteTask(${i})">✕</button>
          </div>
        </div>`;
    });
  }

  // Initial loads
  saveAndShow();
  loadTimerState(); // This is what restores your timer on refresh
  updateDisplay();
    </script>

</body>
</html>
