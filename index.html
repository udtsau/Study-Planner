<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Planner</title>
  <style>

  body 
{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #dbeafe, #f0fdf4);
  
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  width: 380px;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);

  display: flex;
  flex-direction: column;
  align-items: center;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

    h2 {
  margin-bottom: 15px;
}

#progress {
  margin-top: 10px;
  font-size: 14px;
  color: #555;
}

#mode {
  margin-top: 15px;
  font-weight: 600;
}

#timer {
  font-size: 26px;
  margin: 8px 0;
}
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  outline: none;
  font-size: 14px;
}

input:focus {
  border-color: #4ade80;
  box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.2);
}
    button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #4ade80, #22c55e);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 12px rgba(0,0,0,0.15);
}    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .task button {
      width: auto;
      padding: 5px 10px;
      margin-left: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Study Planner</h2>

  <input type="text" id="subject" placeholder="Subject">
  <input type="text" id="topic" placeholder="Topic">
  <input type="number" id="questions" placeholder="Number of MCQs">

  <button onclick="addTask()">Add Task</button>

<p id="mode">Mode: Study</p>
<p id="timer">60:00</p>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

  <div id="taskList"></div>
</div>


<script>
let time = 3600; // 60 min in seconds
let isStudy = true;
let interval = null;
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function renderTasks() {
    const taskList = document.getElementById("taskList");
    taskList.innerHTML = "";

    tasks.forEach((task, index) => {
      const div = document.createElement("div");
      div.className = "task";

      const text = document.createElement("span");
      text.innerText = `${task.subject} - ${task.topic} (${task.questions} MCQs)`;

      if (task.completed) {
        text.classList.add("completed");
      }

      const completeBtn = document.createElement("button");
      completeBtn.innerText = "✔";
      completeBtn.onclick = () => toggleComplete(index);

      const deleteBtn = document.createElement("button");
      deleteBtn.innerText = "✖";
      deleteBtn.onclick = () => deleteTask(index);

      div.appendChild(text);
      div.appendChild(completeBtn);
      div.appendChild(deleteBtn);

      taskList.appendChild(div);
    });
  }

  function addTask() {
    const subject = document.getElementById("subject").value;
    const topic = document.getElementById("topic").value;
    const questions = document.getElementById("questions").value;

    if (!subject || !topic || !questions) {
      alert("Fill all fields!");
      return;
    }

    tasks.push({
      subject,
      topic,
      questions,
      completed: false
    });

    saveTasks();
    renderTasks();

    document.getElementById("subject").value = "";
    document.getElementById("topic").value = "";
    document.getElementById("questions").value = "";
  }

  function toggleComplete(index) {
    tasks[index].completed = !tasks[index].completed;
    saveTasks();
    renderTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
  }
renderTasks();

function startTimer() {
  if (interval) return; // prevents multiple timers

  interval = setInterval(() => {
    time--;

    let min = Math.floor(time / 60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      `${min}:${sec < 10 ? '0' : ''}${sec}`;

    if (time <= 0) {
      clearInterval(interval);
      interval = null;

      // switch mode
      if (isStudy) {
        isStudy = false;
        time = 600; // 10 min break
        document.getElementById("mode").innerText = "Mode: Break";
      } else {
        isStudy = true;
        time = 3600; // back to study
        document.getElementById("mode").innerText = "Mode: Study";
      }

      startTimer(); // auto start next session
    }
  }, 1000);
}
function resetTimer() {
  clearInterval(interval);
  interval = null;
  isStudy = true;
  time = 3600;

  document.getElementById("mode").innerText = "Mode: Study";
  document.getElementById("timer").innerText = "60:00";
}

  </script>

</body>
</html>
