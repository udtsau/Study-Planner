<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Planner</title>

 <style>
  /* Updated Task Styling for Bold Symbols */
  .task {
    background: white;
    padding: 12px 16px;
    border-radius: 12px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    animation: appleFade 0.4s ease;
  }

  .task-text {
    font-size: 15px;
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .completed {
    text-decoration: line-through;
    opacity: 0.4;
  }

  .action-buttons {
    display: flex;
    gap: 15px;
  }

  .action-btn {
    background: none;
    border: none;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;
    padding: 5px;
    transition: transform 0.2s;
  }

  .tick-btn { color: #000000; }
  .cross-btn { color: #808080; }
  .action-btn:hover { transform: scale(1.2); }
</style>

<script>
  let time = 3600; 
  let isStudy = true;
  let interval = null;
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function updateDisplay() {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
  }

  function startTimer() {
    if (interval) return; // Already running
    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        interval = null;
        isStudy = !isStudy;
        time = isStudy ? 3600 : 600;
        document.getElementById("mode").innerText = isStudy ? "MODE: STUDY" : "MODE: BREAK";
        startTimer();
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    interval = null;
  }

  function resetTimer() {
    pauseTimer();
    isStudy = true;
    time = 3600;
    document.getElementById("mode").innerText = "MODE: STUDY";
    updateDisplay();
  }

  function addTask() {
    const subject = document.getElementById("subject").value;
    const topic = document.getElementById("topic").value;
    const questions = document.getElementById("questions").value;

    if (!subject || !topic || !questions) {
      alert("Please fill all fields");
      return;
    }

    tasks.push({ subject, topic, questions, completed: false });
    saveAndRender();
    
    document.getElementById("subject").value = "";
    document.getElementById("topic").value = "";
    document.getElementById("questions").value = "";
  }

  function toggleComplete(index) {
    tasks[index].completed = !tasks[index].completed;
    saveAndRender();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveAndRender();
  }

  function saveAndRender() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    renderTasks();
  }

  function renderTasks() {
    const taskList = document.getElementById("taskList");
    taskList.innerHTML = "";

    tasks.forEach((task, index) => {
      const div = document.createElement("div");
      div.className = "task";
      
      div.innerHTML = `
        <span class="task-text ${task.completed ? 'completed' : ''}">
          ${task.subject} - ${task.topic}
        </span>
        <div class="action-buttons">
          <button class="action-btn tick-btn" onclick="toggleComplete(${index})">✓</button>
          <button class="action-btn cross-btn" onclick="deleteTask(${index})">✕</button>
        </div>
      `;
      taskList.appendChild(div);
    });
  }

  // Initial load
  renderTasks();
</script>
</body>
</html>
