<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner</title>
  <style>
    :root {
      --apple-blue: #007AFF;
      --apple-gray: #8E8E93;
      --container-bg: rgba(255, 255, 255, 0.7); 
      --text-color: #000000;
      --input-bg: rgba(0, 0, 0, 0.05);
      --task-bg: rgba(255, 255, 255, 0.5);
      --border-color: rgba(0, 0, 0, 0.1);
      --aura-bg: #f5f5f7;
      --orb-opacity: 0.3;
    }

    [data-theme="dark"] {
      --container-bg: rgba(28, 28, 30, 0.8);
      --text-color: #ffffff;
      --input-bg: rgba(255, 255, 255, 0.1);
      --task-bg: rgba(255, 255, 255, 0.05);
      --apple-gray: #aeaeb2;
      --border-color: rgba(255, 255, 255, 0.1);
      --aura-bg: #000000;
      --orb-opacity: 0.5;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background-color: var(--aura-bg);
      background-image: 
        radial-gradient(circle at 15% 30%, rgba(255, 0, 150, var(--orb-opacity)) 0%, transparent 25%),
        radial-gradient(circle at 85% 70%, rgba(255, 120, 0, var(--orb-opacity)) 0%, transparent 25%),
        radial-gradient(circle at 50% 10%, rgba(150, 0, 255, var(--orb-opacity)) 0%, transparent 30%);
      transition: all 0.5s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start; 
      min-height: 100vh;
      color: var(--text-color);
      overflow-y: auto; 
      padding: 50px 0; 
    }

    .container {
      width: 350px;
      background: var(--container-bg);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      position: relative;
      border: 1px solid var(--border-color);
    }

    .mode-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--input-bg);
      border: none;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
    }

    h2 { text-align: center; font-weight: 700; margin-bottom: 20px; color: var(--text-color); }

    input {
      background: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 12px;
      outline: none;
    }

    .primary-btn {
      background: var(--apple-blue);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .secondary-btn {
      background: var(--input-bg);
      color: var(--apple-blue);
      border: 1px solid var(--apple-blue);
      padding: 8px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }

    #mode { font-size: 11px; letter-spacing: 1px; color: var(--apple-gray); text-align: center; margin-bottom: 0; }
    #timer { font-size: 60px; font-weight: 200; text-align: center; margin: 5px 0 20px 0; font-variant-numeric: tabular-nums; }

    .button-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    
    .timer-btn {
      background: var(--input-bg);
      color: var(--apple-blue);
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .task {
      background: var(--task-bg);
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      border: 1px solid var(--border-color);
    }

    .task-text { font-size: 14px; color: var(--text-color); }
    .completed { text-decoration: line-through; opacity: 0.4; }

    .action-btn { background: none; border: none; font-weight: 900; font-size: 18px; cursor: pointer; }
    .tick-btn { color: var(--apple-blue); } 
    .cross-btn { color: var(--apple-gray); }
  </style>
</head>
<body>

<div class="container">
  <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

  <h2>Study Planner</h2>
  
  <div style="display: flex; gap: 5px; margin-bottom: 5px;">
    <input type="number" id="studyInput" placeholder="Study (m)" style="width: 50%;">
    <input type="number" id="breakInput" placeholder="Break (m)" style="width: 50%;">
  </div>
  <button class="secondary-btn" onclick="setCustomTimes()">Set Timer Durations</button>
  
  <input type="text" id="subject" placeholder="Subject">
  <input type="text" id="topic" placeholder="Topic">
  <button class="primary-btn" onclick="addTask()">Add Task</button>

  <p id="mode">MODE: STUDY</p>
  <p id="timer">--:--</p>
  
  <div class="button-group">
    <button class="timer-btn" onclick="startTimer()">Start</button>
    <button class="timer-btn" onclick="pauseTimer()">Pause</button>
    <button class="timer-btn" onclick="resetTimer()">Reset</button>
  </div>

  <div id="taskList"></div>
</div>

<script>
  /* --- DARK MODE LOGIC --- */
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    document.getElementById("themeBtn").innerText = theme === "dark" ? "☀️" : "🌙";
    localStorage.setItem("theme", theme);
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme");
    applyTheme(current === "dark" ? "light" : "dark");
  }

  // Init Theme
  const savedTheme = localStorage.getItem("theme") || "light";
  applyTheme(savedTheme);

  /* --- TIMER & DATA STATE --- */
  let studyMins = localStorage.getItem("customStudy") || 60;
  let breakMins = localStorage.getItem("customBreak") || 10;
  let isStudy = localStorage.getItem("timerMode") === "false" ? false : true;
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
  let interval = null;
  
  // Load remaining time or default
  let time = localStorage.getItem("timerTime") ? parseInt(localStorage.getItem("timerTime")) : (studyMins * 60);

  document.getElementById("studyInput").value = studyMins;
  document.getElementById("breakInput").value = breakMins;

  function updateDisplay() {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    document.getElementById("mode").innerText = isStudy ? "MODE: STUDY" : "MODE: BREAK";
    
    localStorage.setItem("timerTime", time);
    localStorage.setItem("timerMode", isStudy);
    localStorage.setItem("lastTimestamp", Date.now());
  }

  function setCustomTimes() {
    pauseTimer();
    studyMins = document.getElementById("studyInput").value || 60;
    breakMins = document.getElementById("breakInput").value || 10;
    localStorage.setItem("customStudy", studyMins);
    localStorage.setItem("customBreak", breakMins);
    
    isStudy = true;
    time = studyMins * 60;
    updateDisplay();
    alert("Timer updated!");
  }

  /* --- UPDATED TIMER LOGIC --- */
  function startTimer() {
    if (interval) return;

    // We store the "Expected Finish Time" so the timer stays accurate 
    // even if the tab is in the background.
    let expectedEndTime = Date.now() + (time * 1000);

    interval = setInterval(() => {
      let now = Date.now();
      let remaining = Math.round((expectedEndTime - now) / 1000);

      if (remaining > 0) {
        time = remaining;
        updateDisplay();
      } else {
        // Mode Switch logic remains the same
        clearInterval(interval);
        interval = null;
        isStudy = !isStudy;
        time = isStudy ? (studyMins * 60) : (breakMins * 60);
        updateDisplay();
        startTimer(); // Auto-start the next session (Break or Study)
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    interval = null;
    // We update display to ensure the current 'time' is locked into localStorage
    updateDisplay();
  }
  function resetTimer() {
    pauseTimer(); // Clears the old interval
    // Sets the time back to your custom duration
    time = isStudy ? (studyMins * 60) : (breakMins * 60); 
    updateDisplay();
    startTimer(); // <--- Add this line here to resume immediately
  }

  /* --- TASK LOGIC --- */
  function addTask() {
    const s = document.getElementById("subject").value.trim();
    const t = document.getElementById("topic").value.trim();
    if (!s || !t) return;

    tasks.push({ s, t, done: false });
    saveAndShow();
    document.getElementById("subject").value = "";
    document.getElementById("topic").value = "";
  }

  function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    saveAndShow();
  }

  function deleteTask(i) {
    tasks.splice(i, 1);
    saveAndShow();
  }

  function saveAndShow() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    const list = document.getElementById("taskList");
    list.innerHTML = "";
    tasks.forEach((task, i) => {
      list.innerHTML += `
        <div class="task">
          <span class="task-text ${task.done ? 'completed' : ''}">${task.s} - ${task.t}</span>
          <div>
            <button class="action-btn tick-btn" onclick="toggleTask(${i})">✓</button>
            <button class="action-btn cross-btn" onclick="deleteTask(${i})">✕</button>
          </div>
        </div>`;
    });
  }

  // Crash-proof Logic
  const lastTs = localStorage.getItem("lastTimestamp");
  if (lastTs && time > 0) {
    const elapsed = Math.floor((Date.now() - parseInt(lastTs)) / 1000);
    time = Math.max(0, time - elapsed);
  }

  saveAndShow();
  updateDisplay();
</script>

</body>
</html>
