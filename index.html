<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Study Planner</title>
  <style>
    :root {
      --apple-blue: #007AFF;
      --apple-gray: #8E8E93;
      --container-bg: rgba(255, 255, 255, 0.75);
      --text-color: #1d1d1f;
      --input-bg: rgba(0, 0, 0, 0.05);
      --task-bg: rgba(255, 255, 255, 0.6);
      --border: rgba(0, 0, 0, 0.1);
      --aura-bg: #f5f5f7;
      --orb-opacity: 0.3;
    }

    body.dark-mode {
      --container-bg: rgba(28, 28, 30, 0.85);
      --text-color: #ffffff;
      --input-bg: rgba(255, 255, 255, 0.1);
      --task-bg: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --aura-bg: #000000;
      --orb-opacity: 0.5;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background-color: var(--aura-bg);
      background-image: 
        radial-gradient(circle at 15% 30%, rgba(255, 0, 150, var(--orb-opacity)) 0%, transparent 25%),
        radial-gradient(circle at 85% 70%, rgba(255, 120, 0, var(--orb-opacity)) 0%, transparent 25%),
        radial-gradient(circle at 50% 10%, rgba(150, 0, 255, var(--orb-opacity)) 0%, transparent 30%);
      transition: all 0.5s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-color);
    }

    .container {
      width: 360px;
      background: var(--container-bg);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      padding: 30px;
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .mode-toggle {
      position: absolute; top: 20px; right: 20px;
      background: var(--input-bg); border: none;
      width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; font-size: 18px; color: var(--text-color);
    }

    h2 { text-align: center; font-weight: 700; margin-top: 0; margin-bottom: 20px; }

    input {
      width: 100%; box-sizing: border-box;
      background: var(--input-bg); color: var(--text-color);
      border: 1px solid var(--border);
      padding: 12px; margin-bottom: 10px;
      border-radius: 12px; outline: none; font-size: 15px;
    }

    .primary-btn {
      width: 100%; background: var(--apple-blue); color: white;
      border: none; padding: 14px; border-radius: 12px;
      font-weight: 600; cursor: pointer; margin-bottom: 25px;
    }

    #mode { font-size: 12px; letter-spacing: 1px; color: var(--apple-gray); text-align: center; margin: 0; font-weight: bold; }
    #timer { font-size: 64px; font-weight: 200; text-align: center; margin: 5px 0 20px 0; font-variant-numeric: tabular-nums; }

    /* CRITICAL: Fix for Button Visibility */
    .button-group { 
      display: grid !important; 
      grid-template-columns: 1fr 1fr 1fr; 
      gap: 10px; 
      margin-bottom: 25px;
      visibility: visible !important;
      opacity: 1 !important;
    }

    .timer-btn {
      background: var(--input-bg); color: var(--apple-blue);
      border: none; padding: 12px; border-radius: 12px;
      font-weight: 700; cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }

    .timer-btn:active { background: rgba(0, 122, 255, 0.2); }

    .task {
      background: var(--task-bg); padding: 14px; border-radius: 16px;
      margin-top: 10px; display: flex; justify-content: space-between;
      align-items: center; border: 1px solid var(--border);
    }

    .completed { text-decoration: line-through; opacity: 0.4; }
    .action-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--apple-blue); }
    .cross-btn { color: var(--apple-gray); margin-left: 10px; }
  </style>
</head>
<body>

<div class="container">
  <button class="mode-toggle" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
  <h2>Study Planner</h2>
  
  <input type="text" id="subject" placeholder="Subject">
  <input type="text" id="topic" placeholder="Topic">
  <input type="number" id="questions" placeholder="MCQs">
  <button class="primary-btn" onclick="addTask()">Add Task</button>

  <p id="mode">MODE: STUDY</p>
  <p id="timer">60:00</p>
  
  <div class="button-group">
    <button class="timer-btn" onclick="startTimer()">Start</button>
    <button class="timer-btn" onclick="pauseTimer()">Pause</button>
    <button class="timer-btn" onclick="resetTimer()">Reset</button>
  </div>

  <div id="taskList"></div>
</div>

<script>
  let time = 3600; 
  let interval = null;
  let isStudy = true;
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    const isDark = document.body.classList.contains("dark-mode");
    localStorage.setItem("theme", isDark ? "dark" : "light");
    document.getElementById("themeBtn").innerText = isDark ? "☀️" : "🌙";
  }

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
    document.getElementById("themeBtn").innerText = "☀️";
  }

  function updateDisplay() {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
  }

  function startTimer() {
    if (interval) return;
    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        interval = null;
        isStudy = !isStudy;
        time = isStudy ? 3600 : 600;
        document.getElementById("mode").innerText = isStudy ? "MODE: STUDY" : "MODE: BREAK";
        alert(isStudy ? "Break over! Focus time." : "Session complete! Enjoy your break.");
        startTimer();
      }
    }, 1000);
  }

  function pauseTimer() { clearInterval(interval); interval = null; }
  function resetTimer() { 
    pauseTimer(); 
    time = isStudy ? 3600 : 600; 
    updateDisplay(); 
  }
