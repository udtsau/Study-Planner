<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner</title>
  <style>
    :root {
      --apple-blue: #007AFF;
      --apple-gray: #8E8E93;
      --glass-bg: rgba(255, 255, 255, 0.8);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: linear-gradient(135deg, #e2e2e2, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 350px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    h2 { text-align: center; font-weight: 700; margin-bottom: 20px; }

    input {
      background: rgba(0, 0, 0, 0.05);
      border: none;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 12px;
      outline: none;
    }

    .primary-btn {
      background: var(--apple-blue);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }

    #mode { font-size: 11px; letter-spacing: 1px; color: var(--apple-gray); text-align: center; margin-bottom: 0; }
    #timer { font-size: 60px; font-weight: 200; text-align: center; margin: 5px 0 20px 0; font-variant-numeric: tabular-nums; }

    .button-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    
    .timer-btn {
      background: rgba(0,0,0,0.05);
      color: var(--apple-blue);
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Task styling */
    .task {
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .task-text { font-size: 14px; transition: 0.3s; }
    .completed { text-decoration: line-through; opacity: 0.3; font-weight: normal; }

    .action-btn { background: none; border: none; font-weight: 900; font-size: 18px; cursor: pointer; padding: 0 5px; }
    .tick-btn { color: #000000; }
    .cross-btn { color: #ff3b30; }
  </style>
</head>
<body>

<div class="container">
  <h2>Study Planner</h2>
  <input type="text" id="subject" placeholder="Subject">
  <input type="text" id="topic" placeholder="Topic">
  <input type="number" id="questions" placeholder="MCQs">
  <button class="primary-btn" onclick="addTask()">Add Task</button>

  <p id="mode">MODE: STUDY</p>
  <p id="timer">60:00</p>
  
  <div class="button-group">
    <button class="timer-btn" onclick="startTimer()">Start</button>
    <button class="timer-btn" onclick="pauseTimer()">Pause</button>
    <button class="timer-btn" onclick="resetTimer()">Reset</button>
  </div>

  <div id="taskList"></div>
</div>

<script>
  let time = 3600; 
  let interval = null;
  let isStudy = true;
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function updateDisplay() {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
  }

  function startTimer() {
    if (interval) return; // Prevent double-speed
    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        interval = null;
        isStudy = !isStudy;
        time = isStudy ? 3600 : 600;
        document.getElementById("mode").innerText = isStudy ? "MODE: STUDY" : "MODE: BREAK";
        startTimer();
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    interval = null;
  }

  function resetTimer() {
    pauseTimer();
    time = 3600;
    isStudy = true;
    document.getElementById("mode").innerText = "MODE: STUDY";
    updateDisplay();
  }

  function addTask() {
    const s = document.getElementById("subject").value;
    const t = document.getElementById("topic").value;
    const q = document.getElementById("questions").value;
    if (!s || !t || !q) return alert("Fill all fields");

    tasks.push({ s, t, q, done: false });
    saveAndShow();
    document.getElementById("subject").value = "";
    document.getElementById("topic").value = "";
    document.getElementById("questions").value = "";
  }

  function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    saveAndShow();
  }

  function deleteTask(i) {
    tasks.splice(i, 1);
    saveAndShow();
  }

  function saveAndShow() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    const list = document.getElementById("taskList");
    list.innerHTML = "";
    tasks.forEach((task, i) => {
      list.innerHTML += `
        <div class="task">
          <span class="task-text ${task.done ? 'completed' : ''}">${task.s} - ${task.t}</span>
          <div>
            <button class="action-btn tick-btn" onclick="toggleTask(${i})">✓</button>
            <button class="action-btn cross-btn" onclick="deleteTask(${i})">✕</button>
          </div>
        </div>`;
    });
  }

  saveAndShow(); // Load tasks on start
</script>

</body>
</html>
